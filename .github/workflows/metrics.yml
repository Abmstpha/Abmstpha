name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refresh every 6 hours
  workflow_dispatch:         # allow manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          template: classic
          base: "header, activity, community, repositories, metadata"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: "markup, programming"
          plugin_languages_limit: 8
          plugin_languages_threshold: "0%"
          config_timezone: "Europe/Paris"

      - name: Commit updated metrics.svg
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh metrics.svg [skip ci]"
          file_pattern: metrics.svg
